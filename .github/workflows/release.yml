name: Release

permissions:
  contents: write

"on":
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.prepare.outputs.release_tag }}
      release_version: ${{ steps.prepare.outputs.release_version }}
      should_release: ${{ steps.prepare.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare release metadata
        id: prepare
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            SHOULD_RELEASE=true
          else
            VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
            TAG="v$VERSION"

            if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists on origin; skipping release"
              SHOULD_RELEASE=false
            else
              git tag "$TAG"
              git push origin "$TAG"
              SHOULD_RELEASE=true
            fi
          fi

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.os }}
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build app bundle
        run: npm run build

      - name: Package desktop app
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: the-big-ide-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.tar.gz
            release/*.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [prepare-release, build]
    if: needs.prepare-release.outputs.should_release == 'true'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: The Big IDE ${{ needs.prepare-release.outputs.release_tag }}
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.tar.gz
            artifacts/**/*.exe
          generate_release_notes: true

  refresh-release-metadata:
    name: Refresh release metadata
    runs-on: ubuntu-latest
    needs: [prepare-release, publish-release]
    if: ${{ !cancelled() && needs.prepare-release.result == 'success' && (needs.publish-release.result == 'success' || needs.publish-release.result == 'skipped') }}

    steps:
      - name: Update release notes and archive old releases
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          SHOULD_RELEASE: ${{ needs.prepare-release.outputs.should_release }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const managedNotesPattern = /<!-- big-ide-release-notes:start -->[\s\S]*?<!-- big-ide-release-notes:end -->\n*/g;
            const archivedBannerPattern = /<!-- big-ide-archived-release:start -->[\s\S]*?<!-- big-ide-archived-release:end -->\n*/g;

            const normalizeBody = (body) => (body || '').trim();
            const releaseNotesBlock = (version) => `<!-- big-ide-release-notes:start -->\n## Release Notes\n\n- npm package: \`the-big-ide@${version}\`\n- Desktop downloads: Linux \`.AppImage\`/\`.tar.gz\`, macOS arm64 \`.dmg\`/\`.zip\`, Windows \`.exe\`/\`.zip\`\n- Signing: unsigned desktop artifacts\n<!-- big-ide-release-notes:end -->`;
            const archivedBanner = [
              '<!-- big-ide-archived-release:start -->',
              '> Archived release: superseded by a newer published version. Use the latest release unless you need this exact build.',
              '<!-- big-ide-archived-release:end -->',
            ].join('\n');

            const allReleases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            if (!allReleases.length) {
              core.info('No releases found; nothing to refresh.');
              return;
            }

            const shouldRelease = process.env.SHOULD_RELEASE === 'true';
            const requestedTag = process.env.RELEASE_TAG;
            let currentRelease = null;

            if (requestedTag) {
              currentRelease = allReleases.find((release) => release.tag_name === requestedTag) || null;
            }

            if (!currentRelease) {
              currentRelease = allReleases.find((release) => !release.draft && !release.prerelease) || allReleases.find((release) => !release.draft) || null;
            }

            if (!currentRelease) {
              core.setFailed('Could not determine current release to refresh.');
              return;
            }

            const currentVersion = currentRelease.tag_name.replace(/^v/, '');
            const currentBody = normalizeBody(currentRelease.body)
              .replace(managedNotesPattern, '')
              .replace(archivedBannerPattern, '')
              .trim();

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: currentRelease.id,
              tag_name: currentRelease.tag_name,
              name: `The Big IDE ${currentRelease.tag_name}`,
              body: [releaseNotesBlock(currentVersion), currentBody].filter(Boolean).join('\n\n'),
              draft: currentRelease.draft,
              prerelease: false,
              make_latest: 'true',
            });

            core.info(`Updated current release metadata for ${currentRelease.tag_name}.`);

            const staleReleases = allReleases.filter((release) => !release.draft && release.id !== currentRelease.id);

            for (const release of staleReleases) {
              const staleBody = normalizeBody(release.body)
                .replace(archivedBannerPattern, '')
                .trim();

              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                tag_name: release.tag_name,
                name: release.name && release.name.startsWith('[Archived] ')
                  ? release.name
                  : `[Archived] ${release.name || release.tag_name}`,
                body: [archivedBanner, staleBody].filter(Boolean).join('\n\n'),
                draft: release.draft,
                prerelease: true,
                make_latest: 'false',
              });

              core.info(`Archived release ${release.tag_name}.`);
            }

            if (!shouldRelease) {
              core.info('No new release was published in this run; refreshed existing release metadata only.');
            }

  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: [prepare-release, build]
    if: needs.prepare-release.outputs.should_release == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
